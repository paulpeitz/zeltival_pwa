		<style>
			body {
				background-color: #fff;
				font-size:14px;

				background-image: url('img/ZELTIVAL_2026.jpg');
				background-color: #e5758b;
				color: #333333;
				background-size: 400px;
				background-repeat: no-repeat;
				background-attachment: fixed;
				background-position: -34px -20px;				
			}
			
			img {
				border-radius: 0%;
			}
					
			.wrapper {
				display: grid;
				grid-template-columns: 20% 20% 20% 20% 20%;
				margin-left: 174px;
				margin-top: 0px;
				margin-right: 20px;

			}

			.song {
				border: 0px;
				width: 80%;
				padding-bottom: 10px
			}

			.titel {
				font-size: 12px;
				font-weight: bold; 
			}

			.datum {
				font-size: 10px;
				font-weight: bold;
			}

			.box {
				color: #333333;
				border-radius: 10px;
				padding: 10px;
				font-size: 150%;
				text-align: center;
			}
			
			.header {
			  position: sticky;
			  top: 0;
			  font-size: 1px;
			  font-weight: bold;
			  margin-left: 0px;
			  text-align: center;
			}
			
		</style>
  
</head>
<body>
 
		<div class="header" id="myHeader">
			<div id="embed-iframe"></div>
		</div>
			<script src="https://open.spotify.com/embed/iframe-api/v1" async></script>
			<script type="text/javascript">
				window.onSpotifyIframeApiReady = (IFrameAPI) => {
				  const element = document.getElementById('embed-iframe');
				  const options = {
					width: '0px',
					height: '0px',
					position: 'fixed',
					top: '0',
					uri: 'spotify:track:1MdbDBwEEecnlLiyWChJFh'
				  };
				  const callback = (EmbedController) => {
					document.querySelectorAll('.box').forEach(
					  box => {
						box.addEventListener('click', () => {
							EmbedController.loadUri(box.dataset.spotifyId);
							var myArray = document.getElementsByClassName('box');
							var arr = Array.from(myArray);
							var playing = box.style.color;
							  if (playing == 'rgb(0, 120, 0)'){
								EmbedController.pause();
								arr.forEach((item,counter)=>(item.style.color = "#333333"));
							  } else {
								EmbedController.play();
								arr.forEach((item,counter)=>(item.style.color = "#333333"));
								box.style.color = "#007800";
							  }
						});
					  })
				  };
				  IFrameAPI.createController(element, options, callback);
				};
			  </script>
